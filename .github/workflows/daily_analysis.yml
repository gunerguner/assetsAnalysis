name: Daily Asset Analysis

on:
  schedule:
    # 美股收盘时间：美东时间 16:00 (东部时间 UTC-4/UTC-5)
    # 美股收盘后 1 小时 = 美东时间 17:00
    # 转换为 UTC 时间：21:00 或 22:00 (取决于夏令时)
    # cron 格式：分 时 日 月 星期 (UTC 时间)
    # 每周五美股收盘后执行（周五 = 5）
    - cron: '30 22 * * 5'
  workflow_dispatch:
    inputs:
      use_ai:
        description: 'Use AI analysis'
        required: false
        default: 'false'
        type: boolean

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          TZ: America/New_York
        run: |
          DATE=$(TZ='America/New_York' date +%Y-%m-%d)
          YEAR=$(echo "$DATE" | cut -d'-' -f1)
          MONTH=$(echo "$DATE" | cut -d'-' -f2)

          REPORT_DIR="/tmp/analysis_output/report"
          LOG_FILE="/tmp/analysis_output/${DATE}.log"

          mkdir -p "$REPORT_DIR"

          echo "Running analysis for date: $DATE"
          echo "Generated report directory: $REPORT_DIR"
          echo "Execution log will be saved to: $LOG_FILE"

          python main.py -a -w -o "$REPORT_DIR" 2>&1 | tee "$LOG_FILE"

          REPORT_FILE=$(find "$REPORT_DIR" -maxdepth 1 -type f -name 'analysis_*.md' | sort | tail -n 1)
          if [ -z "$REPORT_FILE" ]; then
            echo "[ERROR] No generated analysis report found in $REPORT_DIR"
            exit 1
          fi

          echo "REPORT_FILE=$REPORT_FILE" >> "$GITHUB_ENV"
          echo "DATE=$DATE" >> "$GITHUB_ENV"
          echo "YEAR=$YEAR" >> "$GITHUB_ENV"
          echo "MONTH=$MONTH" >> "$GITHUB_ENV"

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Commit and push to data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[INFO] Preparing to publish analysis for date: ${{ env.DATE }}"

          echo "[INFO] Checking out data branch"
          git fetch origin data 2>/dev/null || true

          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout -f -B data origin/data
          else
            git checkout -f --orphan data
            git rm -rf . 2>/dev/null || true
          fi

          OUTPUT_FILE="data/${{ env.YEAR }}/${{ env.MONTH }}/${{ env.DATE }}.md"

          echo "[INFO] Publishing generated report to ${OUTPUT_FILE}"

          mkdir -p "data/${{ env.YEAR }}/${{ env.MONTH }}"
          cp "${{ env.REPORT_FILE }}" "$OUTPUT_FILE"

          git add -f "$OUTPUT_FILE"

          if git diff --cached --quiet; then
            echo "[INFO] No changes detected. File content is identical. Skipping commit and push."
            exit 0
          fi

          echo "[INFO] Changes detected. Committing and pushing to data branch"
          git commit -m "Add stock analysis for ${{ env.DATE }}

          Auto-generated by GitHub Actions"
          git push -u origin data
